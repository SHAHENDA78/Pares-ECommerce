<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Dancing+Script&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <title>Login - PARES</title>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-cover relative" style="background-image: url(https://i.pinimg.com/1200x/c3/2f/12/c32f12e044dd195329a52e1ca0120460.jpg);">
    <div class="max-w-md w-full space-y-8 bg-white/80 backdrop-blur-xl rounded-3xl p-10 shadow-2xl border border-white/50">
        <div class="text-center">
            <h1 class="text-4xl md:text-5xl font-bold text-[#220E0A] mb-4">Welcome Back</h1>
            <p id="loginPrompt" class="text-lg text-gray-700 mb-8">Please log in to continue shopping</p>
        </div>

        <div class="flex bg-gray-50 rounded-xl p-1 mb-8">
            <button id="loginTab" class="flex-1 py-3 px-4 font-semibold text-[#220E0A] bg-white rounded-lg shadow-sm transition">Login</button>
            <button id="registerTab" class="flex-1 py-3 px-4 font-semibold text-gray-600 rounded-lg hover:text-[#220E0A] transition">Register</button>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                <input type="email" id="loginEmail" required class="w-full px-4 py-3 outline-none border border-[#220E0A]/50 rounded-xl focus:ring-2 focus:ring-[#220E0A] focus:border-transparent transition" placeholder="your@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input type="password" id="loginPassword" required class="w-full px-4 py-3 outline-none border border-[#220E0A]/50 rounded-xl focus:ring-2 focus:ring-[#220E0A] focus:border-transparent transition" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-[#220E0A] hover:bg-[#180a07] text-white font-bold py-4 px-6 rounded-xl text-lg transition duration-300 shadow-lg">
                <span id="loginBtnText">Login</span>
                <i id="loginSpinner" class="fas fa-spinner fa-spin hidden ml-2"></i>
            </button>
        </form>

        <form id="registerForm" class="space-y-6 hidden">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                <input type="text" id="registerName" required class="w-full px-4 py-3 outline-none border border-[#220E0A]/50 rounded-xl focus:ring-2 focus:ring-[#220E0A] focus:border-transparent transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                <input type="email" id="registerEmail" required class="w-full px-4 py-3 outline-none border border-[#220E0A]/50 rounded-xl focus:ring-2 focus:ring-[#220E0A] focus:border-transparent transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input type="password" id="registerPassword" required minlength="6" class="w-full px-4 py-3 outline-none border border-[#220E0A]/50 rounded-xl focus:ring-2 focus:ring-[#220E0A] focus:border-transparent transition">
            </div>
            <button type="submit" class="w-full bg-[#220E0A] hover:bg-[#180a07] text-white font-bold py-4 px-6 rounded-xl text-lg transition duration-300 shadow-lg outline-none">
                <span id="registerBtnText">Create Account</span>
                <i id="registerSpinner" class="fas fa-spinner fa-spin hidden ml-2"></i>
            </button>
        </form>
    </div>

    <script>

        let users = JSON.parse(localStorage.getItem('users')) || {};
        let pendingCartItem = JSON.parse(localStorage.getItem('pendingCartItem')) || null;
        let currentUser = localStorage.getItem('currentUser') || null;

        function updateCartCounter() {
            const counter = document.getElementById('loginCartCounter');
            const count = pendingCartItem ? 1 : 0;
            counter.textContent = count;
            counter.classList.toggle('hidden', count === 0);
        }

        function showSuccessPopup(productName) {
            const popup = document.createElement('div');
            popup.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4';
            popup.innerHTML = `
                <div class="bg-white rounded-3xl p-8 max-w-md w-full text-center shadow-2xl animate-bounce">
                    <div class="w-20 h-20 bg-green-100 rounded-2xl flex items-center justify-center mx-auto mb-6">
                        <i class="fas fa-check text-3xl text-green-500"></i>
                    </div>
                    <h2 class="text-3xl font-bold text-[#220E0A] mb-4">Success!</h2>
                    <p class="text-lg text-gray-700 mb-8">${productName} has been added to your cart!</p>
                    <div class="space-x-4">
                        <a href="cart.html" class="bg-[#220E0A] hover:bg-[#180a07] text-white font-bold py-3 px-8 rounded-xl transition">View Cart</a>
                        <a href="products.html" class="border border-[#220E0A] hover:bg-[#f6e3b4e8] text-[#220E0A] font-bold py-3 px-8 rounded-xl transition">Continue Shopping</a>
                    </div>
                </div>
            `;
            document.body.appendChild(popup);
            
            setTimeout(() => {
                window.location.href = 'cart.html';
            }, 2000);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const spinner = document.getElementById('loginSpinner');
            const btnText = document.getElementById('loginBtnText');

            spinner.classList.remove('hidden');
            btnText.textContent = 'Logging in...';

            await new Promise(r => setTimeout(r, 1000));

            if (users[email] && users[email].password === password) {
                localStorage.setItem('currentUser', email);
                if (pendingCartItem) {
                    let cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
                    const existing = cartItems.find(item => item.id === pendingCartItem.id);
                    if (existing) {
                        existing.quantity++;
                    } else {
                        cartItems.push(pendingCartItem);
                    }
                    localStorage.setItem('cartItems', JSON.stringify(cartItems));
                    localStorage.removeItem('pendingCartItem');
                    showSuccessPopup(pendingCartItem.name);
                } else {
                    window.location.href = 'products.html';
                }
            } else {
                alert('Invalid email or password');
            }

            spinner.classList.add('hidden');
            btnText.textContent = 'Login';
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const spinner = document.getElementById('registerSpinner');
            const btnText = document.getElementById('registerBtnText');

            spinner.classList.remove('hidden');
            btnText.textContent = 'Creating...';

            await new Promise(r => setTimeout(r, 1000));

            if (users[email]) {
                alert('Email already registered');
            } else {
                users[email] = { name, password };
                localStorage.setItem('users', JSON.stringify(users));
                localStorage.setItem('currentUser', email);
                
                if (pendingCartItem) {
                    let cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
                    const existing = cartItems.find(item => item.id === pendingCartItem.id);
                    if (existing) {
                        existing.quantity++;
                    } else {
                        cartItems.push(pendingCartItem);
                    }
                    localStorage.setItem('cartItems', JSON.stringify(cartItems));
                    localStorage.removeItem('pendingCartItem');
                    showSuccessPopup(pendingCartItem.name);
                } else {
                    window.location.href = 'products.html';
                }
            }

            spinner.classList.add('hidden');
            btnText.textContent = 'Create Account';
        });

        // Tab switching
        document.getElementById('loginTab').onclick = () => {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginTab').classList.add('bg-white', 'shadow-sm');
            document.getElementById('registerTab').classList.remove('bg-white', 'shadow-sm');
        };
        document.getElementById('registerTab').onclick = () => {
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerTab').classList.add('bg-white', 'shadow-sm');
            document.getElementById('loginTab').classList.remove('bg-white', 'shadow-sm');
        };

        if (currentUser && !pendingCartItem) {
            window.location.href = 'products.html';
        }

        updateCartCounter();
        if (pendingCartItem) {
            document.getElementById('loginPrompt').textContent = `Add ${pendingCartItem.name} to cart after login`;
        }
    </script>

</body>
</html>
